{% extends 'base.html' %}

{% block title %}Task Form{% endblock %}

{% block content %}
    <h1>Task Form</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Task</button>
    </form>

    <a href="{% url 'task_list' %}" class="btn btn-link">Back to Task List</a>
{% endblock %}
