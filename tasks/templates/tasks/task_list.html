<!DOCTYPE html>
<html>
<head>
    <title>My Tasks</title>
</head>
<body>
    <h1>My Tasks</h1>

    <a href="{% url 'task_create' %}">+ New Task</a>

    <ul>
        {% for task in tasks %}
            <li>
                {% if task.is_completed %}
                    <strike>{{ task.title }}</strike> - Due: {{ task.due_date }} (Completed)
                {% else %}
                    {{ task.title }} - Due: {{ task.due_date }}
                    <a href="{% url 'task_complete' task.id %}">Mark Complete</a>
                {% endif %}
                <a href="{% url 'task_edit' task.id %}">Edit</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
